build:
  name: iOS Simulator Yarn 4 build
  steps:
    - eas/checkout
    - run:
        name: Enable Corepack
        command: corepack enable && corepack prepare yarn@4.9.4 --activate && yarn --version
    - eas/install_node_modules
    - eas/resolve_build_config
    - eas/prebuild
    - run:
        name: Install pods
        working_directory: ./ios
        command: pod install
    - eas/generate_gymfile_from_template
    - eas/run_fastlane
    - eas/upload_artifact:
        name: Upload Simulator app
        inputs:
          type: build-artifact
          path: ios/build/Build/Products/*simulator/*.app
